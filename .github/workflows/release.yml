name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"

      - name: Test
        run: go test ./...

      - name: Build release assets
        run: ./scripts/package_release.sh "${GITHUB_REF_NAME#v}" linux amd64

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes "OpenAI Tool Order Repair $GITHUB_REF_NAME" \
            dist/openai-tool-order-repair_${GITHUB_REF_NAME#v}_linux_amd64.zip \
            dist/checksums.txt
